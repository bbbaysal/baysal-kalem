<svg viewBox="-185 -185 370 205" xmlns="http://w3.org">
  <!-- Gövde ve Çerçeve -->
  <path d="M -150 0 A 150 150 0 0 1 150 0 Z" fill="none" stroke="black" stroke-width="1.2"/>
  <line x1="-155" y1="0" x2="155" y2="0" stroke="black" stroke-width="1.2"/>
  
  <!-- Merkez İşareti -->
  <circle cx="0" cy="0" r="6" fill="none" stroke="black" stroke-width="0.8"/>
  <line x1="-10" y1="0" x2="10" y2="0" stroke="black" stroke-width="0.5"/>
  <line x1="0" y1="-10" x2="0" y2="5" stroke="black" stroke-width="0.5"/>

  <!-- Derece Çizgileri (Her 1 derece için) -->
  <g stroke="black" stroke-width="0.4">
    <!-- Bu kısımda matematiksel olarak 180 çizgi varsayılır, ana olanlar aşağıda tanımlıdır -->
    <line x1="-150" y1="0" x2="150" y2="0" />
  </g>

  <!-- Ana Sayılar ve İşaretler -->
  <g font-family="Arial, sans-serif" font-size="9" text-anchor="middle">
    <!-- 0 Derece -->
    <line x1="-150" y1="0" x2="-138" y2="0" stroke="black" stroke-width="1"/>
    <text x="-165" y="4">0</text>
    <text x="-122" y="4" fill="blue">180</text>

    <!-- 10'ar derecelik artışlar -->
    <!-- 10 deg --> <text transform="rotate(-80) translate(0, -165) rotate(80)">10</text> <text fill="blue" transform="rotate(-80) translate(0, -125) rotate(80)">170</text> <line x1="-147.7" y1="-26.0" x2="-135.9" y2="-23.6" stroke="black"/>
    <!-- 20 deg --> <text transform="rotate(-70) translate(0, -165) rotate(70)">20</text> <text fill="blue" transform="rotate(-70) translate(0, -125) rotate(70)">160</text> <line x1="-140.9" y1="-51.3" x2="-129.6" y2="-47.2" stroke="black"/>
    <!-- 30 deg --> <text transform="rotate(-60) translate(0, -165) rotate(60)">30</text> <text fill="blue" transform="rotate(-60) translate(0, -125) rotate(60)">150</text> <line x1="-129.9" y1="-75.0" x2="-119.5" y2="-69.0" stroke="black"/>
    <!-- 40 deg --> <text transform="rotate(-50) translate(0, -165) rotate(50)">40</text> <text fill="blue" transform="rotate(-50) translate(0, -125) rotate(50)">140</text> <line x1="-114.9" y1="-96.4" x2="-105.7" y2="-88.7" stroke="black"/>
    <!-- 50 deg --> <text transform="rotate(-40) translate(0, -165) rotate(40)">50</text> <text fill="blue" transform="rotate(-40) translate(0, -125) rotate(40)">130</text> <line x1="-96.4" y1="-114.9" x2="-88.7" y2="-105.7" stroke="black"/>
    <!-- 60 deg --> <text transform="rotate(-30) translate(0, -165) rotate(30)">60</text> <text fill="blue" transform="rotate(-30) translate(0, -125) rotate(30)">120</text> <line x1="-75.0" y1="-129.9" x2="-69.0" y2="-119.5" stroke="black"/>
    <!-- 70 deg --> <text transform="rotate(-20) translate(0, -165) rotate(20)">70</text> <text fill="blue" transform="rotate(-20) translate(0, -125) rotate(20)">110</text> <line x1="-51.3" y1="-140.9" x2="-47.2" y2="-129.6" stroke="black"/>
    <!-- 80 deg --> <text transform="rotate(-10) translate(0, -165) rotate(10)">80</text> <text fill="blue" transform="rotate(-10) translate(0, -125) rotate(10)">100</text> <line x1="-26.0" y1="-147.7" x2="-23.6" y2="-135.9" stroke="black"/>
    
    <!-- 90 deg -->
    <line x1="0" y1="-150" x2="0" y2="-135" stroke="black" stroke-width="1"/>
    <text x="0" y="-165">90</text>
    <text x="0" y="-120" fill="blue">90</text>

    <!-- 100-180 arası -->
    <!-- 100 deg --> <text transform="rotate(10) translate(0, -165) rotate(-10)">100</text> <text fill="blue" transform="rotate(10) translate(0, -125) rotate(-10)">80</text> <line x1="26.0" y1="-147.7" x2="23.6" y2="-135.9" stroke="black"/>
    <!-- 110 deg --> <text transform="rotate(20) translate(0, -165) rotate(-20)">110</text> <text fill="blue" transform="rotate(20) translate(0, -125) rotate(-20)">70</text> <line x1="51.3" y1="-140.9" x2="47.2" y2="-129.6" stroke="black"/>
    <!-- 120 deg --> <text transform="rotate(30) translate(0, -165) rotate(-30)">120</text> <text fill="blue" transform="rotate(30) translate(0, -125) rotate(-30)">60</text> <line x1="75.0" y1="-129.9" x2="69.0" y2="-119.5" stroke="black"/>
    <!-- 130 deg --> <text transform="rotate(40) translate(0, -165) rotate(-40)">130</text> <text fill="blue" transform="rotate(40) translate(0, -125) rotate(-40)">50</text> <line x1="96.4" y1="-114.9" x2="88.7" y2="-105.7" stroke="black"/>
    <!-- 140 deg --> <text transform="rotate(50) translate(0, -165) rotate(-50)">140</text> <text fill="blue" transform="rotate(50) translate(0, -125) rotate(-50)">40</text> <line x1="114.9" y1="-96.4" x2="105.7" y2="-88.7" stroke="black"/>
    <!-- 150 deg --> <text transform="rotate(60) translate(0, -165) rotate(-60)">150</text> <text fill="blue" transform="rotate(60) translate(0, -125) rotate(-60)">30</text> <line x1="129.9" y1="-75.0" x2="119.5" y2="-69.0" stroke="black"/>
    <!-- 160 deg --> <text transform="rotate(70) translate(0, -165) rotate(-70)">160</text> <text fill="blue" transform="rotate(70) translate(0, -125) rotate(-70)">20</text> <line x1="140.9" y1="-51.3" x2="129.6" y2="-47.2" stroke="black"/>
    <!-- 170 deg --> <text transform="rotate(80) translate(0, -165) rotate(-80)">170</text> <text fill="blue" transform="rotate(80) translate(0, -125) rotate(-80)">10</text> <line x1="147.7" y1="-26.0" x2="135.9" y2="-23.6" stroke="black"/>

    <!-- 180 Derece -->
    <line x1="150" y1="0" x2="138" y2="0" stroke="black" stroke-width="1"/>
    <text x="165" y="4">180</text>
    <text x="122" y="4" fill="blue">0</text>
  </g>
</svg>

